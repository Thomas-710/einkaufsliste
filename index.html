<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2e7d32" />
  <title>Einkaufsliste</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🛒 Einkaufsliste</h1>
    <span id="counter" class="counter"></span>
  </header>

  <main>
    <div class="list-bar">
      <select id="list-select" class="list-select" aria-label="Liste auswählen"></select>
      <button id="list-new" type="button" class="list-btn" aria-label="Neue Liste" title="Neue Liste">＋</button>
      <button id="list-rename" type="button" class="list-btn" aria-label="Liste umbenennen" title="Liste umbenennen">✎</button>
      <button id="list-delete" type="button" class="list-btn" aria-label="Liste löschen" title="Liste löschen">🗑</button>
    </div>

    <form id="add-form" class="add-form" autocomplete="off">
      <div class="row">
        <input id="item-input" class="item-input" type="text" placeholder="Artikel hinzufügen…" required />
        <input id="qty-input" class="qty-input" type="text" placeholder="Menge" value="1" />
        <button type="submit" class="btn-add" aria-label="Hinzufügen">＋</button>
      </div>
      <div class="row">
        <button id="shop-field" type="button" class="shop-field" aria-label="Geschäft auswählen">
          <span id="shop-field-label" class="shop-field-label">Ohne Geschäft</span>
          <span class="shop-field-chev" aria-hidden="true">▾</span>
        </button>
      </div>
    </form>

    <div class="controls">
      <button id="btn-group" type="button" class="ctrl">📂 Nach Geschäft gruppieren</button>
      <button id="btn-fav" type="button" class="ctrl">⭐ Favoriten</button>
    </div>

    <div id="list" class="list-wrap"></div>

    <p id="empty-hint" class="empty-hint">Noch keine Artikel. Füge oben etwas hinzu. 🥕</p>
  </main>

  <nav class="toolbar">
    <button id="btn-share" class="tool">📲 WhatsApp</button>
    <button id="btn-export" class="tool">⬇️ CSV</button>
    <button id="btn-import" class="tool">⬆️ Import</button>
    <button id="btn-clear-done" class="tool">✓ Erledigte weg</button>
  </nav>

  <!-- Favoriten-Sheet -->
  <div id="fav-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-panel" role="dialog" aria-label="Favoriten">
      <div class="sheet-head">
        <h2>⭐ Favoriten</h2>
        <button id="fav-close" class="sheet-x" aria-label="Schließen" data-close>✕</button>
      </div>
      <p class="sheet-hint">Tippe einen Favoriten, um ihn zur aktuellen Liste hinzuzufügen.</p>
      <input id="fav-filter" class="fav-filter" type="text" placeholder="Nach Anfangsbuchstaben filtern…" autocomplete="off" aria-label="Favoriten filtern" />
      <ul id="fav-list" class="fav-list"></ul>
      <label class="fav-toggle">
        <input type="checkbox" id="fav-autoload" />
        <span>Favoriten beim Start automatisch laden (wenn die Liste leer ist)</span>
      </label>
      <div class="sheet-actions">
        <button id="fav-add-all" type="button" class="tool">Alle zur Liste hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Geschäft-Auswahl-Sheet -->
  <div id="shop-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-shop-close></div>
    <div class="sheet-panel" role="dialog" aria-label="Geschäft wählen">
      <div class="sheet-head">
        <h2>🏬 Geschäft wählen</h2>
        <button class="sheet-x" aria-label="Schließen" data-shop-close>✕</button>
      </div>
      <p class="sheet-hint">Tippe ein Geschäft an oder lege unten ein neues an.</p>
      <ul id="shop-sheet-list" class="picker-list"></ul>
      <form id="shop-new-form" class="shop-new-form" autocomplete="off">
        <input id="shop-new-input" class="shop-new-input" type="text" placeholder="Neues Geschäft…" aria-label="Neues Geschäft" />
        <button type="submit" class="tool">Anlegen</button>
      </form>
    </div>
  </div>

  <!-- Eigenes Eingabe-/Abfragefenster -->
  <div id="dialog" class="dialog" hidden>
    <div class="dialog-backdrop"></div>
    <div class="dialog-box" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <h2 id="dialog-title" class="dialog-title"></h2>
      <p id="dialog-msg" class="dialog-msg"></p>
      <input id="dialog-input" class="dialog-input" type="text" />
      <div id="dialog-actions" class="dialog-actions"></div>
    </div>
  </div>

  <input id="file-input" type="file" accept=".csv,text/csv,text/comma-separated-values" hidden />
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
